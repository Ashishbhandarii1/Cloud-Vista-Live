kind = "web"
previewPath = "/"
title = "Artist Rally Homestay"
version = "1.0.0"
id = "artifacts/homestay-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21288
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/homestay-web run dev"

[services.env]
PORT = "21288"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/homestay-web", "run", "build"]
publicDir = "artifacts/homestay-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
